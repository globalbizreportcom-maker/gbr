name: Deploy Next.js (Zero Downtime)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Prepare standalone package
        run: |
          mkdir deploy
          cp -r .next/standalone deploy/
          cp -r .next/static deploy/.next/
          cp -r public deploy/
          tar -czf deploy.tar.gz deploy

      - name: Upload build
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          source: "deploy.tar.gz"
          target: "/var/www/frontend/"

      - name: Deploy on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}
          script: |

            BASE_DIR=/var/www/frontend

            # Ensure directories exist
            mkdir -p $BASE_DIR
            mkdir -p $BASE_DIR/releases
            mkdir -p $BASE_DIR/logs

            cd $BASE_DIR

            RELEASE=$(date +%s)

            echo "Creating release folder: $RELEASE"
            mkdir -p releases/$RELEASE

            echo "Extracting build..."
            tar -xzf deploy.tar.gz -C releases/$RELEASE
            rm deploy.tar.gz

            echo "Switching to new release..."
            ln -sfn releases/$RELEASE current

            cd current/deploy

            echo "Restarting app..."
            pm2 reload frontend || pm2 start server.js --name frontend

            pm2 save

            echo "Cleaning old releases..."
            cd $BASE_DIR/releases
            ls -t | tail -n +6 | xargs -r rm -rf